<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>opini v2.7.3</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Montserrat:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- 更新遮罩 -->
    <div id="update-overlay" class="page" style="display:none;">
      <div class="update-content">
        <h2>有新版本可用 <span id="new-version"></span></h2>
        <p>請立即刪除此擴充並重新下載！</p>
        <a href="https://lan2015se-collab.github.io/opini/" target="_blank" class="primary-btn">下載最新版本</a>
      </div>
    </div>

    <!-- 登入頁面 -->
    <div id="login-page" class="page">
      <div class="header">
        <img src="icons/icon48.png" class="logo">
        <h1>opini Login</h1>
      </div>
      <div class="form-group">
        <input type="text" id="login-username" placeholder="使用者名稱">
        <input type="password" id="login-password" placeholder="密碼">
        <button id="btn-login" class="primary-btn">登入</button>
        <p class="toggle-text">還沒有帳號？ <span id="go-to-register">立即註冊</span></p>
      </div>
      <button id="nav-settings-login" class="secondary-btn">⚙️ GitHub 設定</button>
    </div>

    <!-- 註冊頁面 -->
    <div id="register-page" class="page" style="display:none;">
      <div class="header">
        <h1>Create Account</h1>
      </div>
      <div class="form-group">
        <input type="text" id="reg-username" placeholder="新使用者名稱">
        <input type="password" id="reg-password" placeholder="設定密碼">
        <button id="btn-register" class="primary-btn">註冊</button>
        <p class="toggle-text">已有帳號？ <span id="go-to-login">返回登入</span></p>
      </div>
    </div>

    <!-- 主頁面 -->
    <div id="home-page" class="page" style="display:none;">
      <div class="header">
        <div class="user-info">Hi, <span id="user-display-name">User</span></div>
        <img src="icons/icon48.png" class="logo">
      </div>
      <div class="tool-grid">
        <button id="nav-urls" class="tool-card">🌐 網址儲存</button>
        <button id="nav-music" class="tool-card">🎵 OpiniMusic</button>
        <button id="nav-clips" class="tool-card">📋 剪貼板</button>
        <button id="nav-save" class="tool-card">💾 OpiniSave</button>
        <button id="nav-calc" class="tool-card">🧮 計算機</button>
        <button id="nav-settings" class="tool-card">⚙️ 設定</button>
      </div>
    </div>

    <!-- 網址儲存頁面 -->
    <div id="urls-page" class="page" style="display:none;">
      <div class="sub-header"><button class="btn-back">⬅</button> <h2>網址儲存</h2></div>
      <div class="input-group">
        <input type="text" id="url-name" placeholder="名稱 (可自訂)">
        <button id="btn-save-url" class="primary-btn">儲存當前分頁</button>
      </div>
      <div id="urls-list" class="item-list"></div>
    </div>

    <!-- 音樂管理頁面 -->
    <div id="music-page" class="page" style="display:none;">
      <div class="sub-header"><button class="btn-back">⬅</button> <h2>OpiniMusic</h2></div>
      <div class="input-group">
        <input type="text" id="music-url-input" placeholder="貼上音樂網址">
        <button id="btn-save-music" class="primary-btn">儲存音樂</button>
      </div>
      <div id="music-list" class="item-list"></div>
    </div>

    <!-- 剪貼板頁面 -->
    <div id="clips-page" class="page" style="display:none;">
      <div class="sub-header"><button class="btn-back">⬅</button> <h2>剪貼板</h2></div>
      <div class="input-group">
        <textarea id="clip-text-input" placeholder="輸入文字或檔案描述..."></textarea>
        <button id="btn-save-clip" class="primary-btn">儲存</button>
      </div>
      <div id="clips-list" class="item-list"></div>
    </div>

    <!-- OpiniSave 頁面 -->
    <div id="save-page" class="page" style="display:none;">
      <div class="sub-header"><button class="btn-back">⬅</button> <h2>OpiniSave</h2></div>
      <div class="input-group">
        <input type="text" id="save-yt-url" placeholder="YouTube 網址">
        <button id="btn-save-yt" class="primary-btn">保存影片</button>
      </div>
      <div id="save-list" class="item-list"></div>
    </div>

    <!-- 計算機頁面 -->
    <div id="calc-page" class="page" style="display:none;">
      <div class="sub-header"><button class="btn-back">⬅</button> <h2>計算機</h2></div>
      <div class="calculator">
        <div id="calc-display">0</div>
        <div class="calc-buttons">
          <button class="calc-btn op" data-val="C">C</button>
          <button class="calc-btn op" data-val="back">⌫</button>
          <button class="calc-btn op" data-val="%">%</button>
          <button class="calc-btn op" data-val="/">÷</button>
          <button class="calc-btn" data-val="7">7</button>
          <button class="calc-btn" data-val="8">8</button>
          <button class="calc-btn" data-val="9">9</button>
          <button class="calc-btn op" data-val="*">×</button>
          <button class="calc-btn" data-val="4">4</button>
          <button class="calc-btn" data-val="5">5</button>
          <button class="calc-btn" data-val="6">6</button>
          <button class="calc-btn op" data-val="-">-</button>
          <button class="calc-btn" data-val="1">1</button>
          <button class="calc-btn" data-val="2">2</button>
          <button class="calc-btn" data-val="3">3</button>
          <button class="calc-btn op" data-val="+">+</button>
          <button class="calc-btn op" data-val="pm">±</button>
          <button class="calc-btn" data-val="0">0</button>
          <button class="calc-btn" data-val=".">.</button>
          <button class="calc-btn equal" data-val="=">=</button>
        </div>
      </div>
    </div>

    <!-- 設定頁面 -->
    <div id="settings-page" class="page" style="display:none;">
      <div class="sub-header"><button class="btn-back">⬅</button> <h2>GitHub 設定</h2></div>
      <div class="settings-content">
        <p>請輸入您的 GitHub Personal Access Token 以啟用雲端同步。</p>
        <input type="password" id="github-token-input" placeholder="ghp_xxxxxxxxxxxx">
        <a href="https://github.com/settings/tokens/new?scopes=repo&description=opini-sync" target="_blank" class="link-btn">👉 點此產生新的 Token</a>
        <button id="btn-save-token" class="primary-btn">儲存 Token</button>
        <hr>
        <button id="btn-logout" class="danger-btn">登出帳號</button>
      </div>
    </div>

    <div class="footer-version">v<span id="current-version">2.7.3</span></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
