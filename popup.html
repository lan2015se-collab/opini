<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>opini v2.1</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 強制更新遮罩 -->
  <div id="update-overlay" class="overlay" style="display:none;">
    <div class="update-card">
      <h2>⚠️ 有新版本可用</h2>
      <p id="update-version-text">有新版本可用 v2.1</p>
      <p class="warning">請立即刪除此擴充並重新下載！</p>
      <a href="https://lan2015se-collab.github.io/opini/" target="_blank" class="download-btn-small">下載最新版本</a>
    </div>
  </div>

  <div id="main-menu" class="container">
    <div class="header-main">
      <h2>opini 工具箱</h2>
      <span class="version-tag">v2.1</span>
    </div>
    <div class="menu-grid">
      <button class="menu-item" id="go-saver">
        <span class="icon">📌</span>
        <span class="text">網址儲存</span>
      </button>
      <button class="menu-item" id="go-music">
        <span class="icon">🎵</span>
        <span class="text">OpiniMusic</span>
      </button>
      <button class="menu-item" id="go-calc">
        <span class="icon">🧮</span>
        <span class="text">計算機</span>
      </button>
    </div>
  </div>

  <!-- 網址儲存工具頁面 -->
  <div id="saver-page" class="container" style="display:none;">
    <div class="header-row">
      <button class="back-btn">⬅️ 返回</button>
      <h2>網址儲存</h2>
    </div>
    <div class="current-info">
      <p id="current-url" class="url-text"></p>
    </div>
    <label>自定義名稱：</label>
    <input type="text" id="custom-name" placeholder="輸入此網址的顯示名稱...">
    <label>備註：</label>
    <textarea id="note-input" placeholder="在這裡輸入備註..."></textarea>
    <button id="save-btn">儲存此網頁</button>
    <hr>
    <h3>已儲存的清單</h3>
    <div id="saved-list" class="scroll-list"></div>
    <button id="clear-all" class="secondary-btn">清除所有紀錄</button>
  </div>

  <!-- OpiniMusic 工具頁面 -->
  <div id="music-page" class="container" style="display:none;">
    <div class="header-row">
      <button class="back-btn">⬅️ 返回</button>
      <h2>OpiniMusic</h2>
    </div>
    <div class="input-group">
      <label>音樂網址 (YouTube/Spotify/Apple Music)：</label>
      <input type="text" id="music-url-input" placeholder="貼上音樂網址...">
      <button id="analyze-save-btn">解析並儲存</button>
    </div>
    <div id="loading-status" style="display:none; font-size:12px; color:#0078d4; margin-bottom:10px;">正在解析音樂資訊...</div>
    <hr>
    <h3>管理歌曲</h3>
    <div id="music-list" class="scroll-list"></div>
  </div>

  <!-- 計算機工具頁面 -->
  <div id="calc-page" class="container" style="display:none;">
    <div class="header-row">
      <button class="back-btn">⬅️ 返回</button>
      <h2>計算機</h2>
    </div>
    <div class="calculator">
      <input type="text" id="calc-display" readonly value="0">
      <div class="calc-buttons">
        <button class="calc-btn clear">C</button>
        <button class="calc-btn operator">/</button>
        <button class="calc-btn operator">*</button>
        <button class="calc-btn operator">-</button>
        <button class="calc-btn">7</button>
        <button class="calc-btn">8</button>
        <button class="calc-btn">9</button>
        <button class="calc-btn operator">+</button>
        <button class="calc-btn">4</button>
        <button class="calc-btn">5</button>
        <button class="calc-btn">6</button>
        <button class="calc-btn equals">=</button>
        <button class="calc-btn">1</button>
        <button class="calc-btn">2</button>
        <button class="calc-btn">3</button>
        <button class="calc-btn">0</button>
        <button class="calc-btn">.</button>
      </div>
    </div>
  </div>

  <!-- YouTube 播放器頁面 -->
  <div id="player-page" class="container" style="display:none;">
    <div class="header-row">
      <button id="player-back-btn">⬅️ 返回清單</button>
      <h2 id="player-title">播放中</h2>
    </div>
    <div id="yt-player-container">
      <!-- 嵌入播放器 -->
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
